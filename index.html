<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gigly — Gig Worker Rights Hub</title>
<link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><rect width="32" height="32" rx="8" fill="%230F766E"/><path d="M16 6 9 9v5.5c0 4.3 3 7.5 7 9.5 4-2 7-5.2 7-9.5V9l-7-3Z" fill="none" stroke="%23fff" stroke-width="2.2" stroke-linejoin="round"/><path d="M12.5 15.6l2.4 2.4 4.6-4.8" fill="none" stroke="%23fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>' />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Mukta:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --primary: #0F766E;
    --primary-700: #115E59;
    --primary-50: #E9F4F2;
    --bg: #FFFBF7;
    --surface: #FFFFFF;
    --text: #1C1917;
    --muted: #78716C;
    --muted-light: #A8A29E;
    --accent: #F97316;
    --accent-50: #FFF1E6;
    --accent-100: #FFE3CC;
    --line: #EFE9E2;
    --r-card: 24px;
    --r-pill: 100px;
    --shadow-soft: 0 8px 24px rgba(15, 118, 110, 0.08);
    --shadow-card: 0 6px 20px rgba(28, 25, 23, 0.05);
    --shadow-pop: 0 12px 32px rgba(15, 118, 110, 0.16);
    --font-h: 'Outfit', sans-serif;
    --font-b: 'Mukta', sans-serif;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: var(--font-b);
    background: #F0ECE6;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }
  /* Page backdrop */
  .stage {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 40px 20px;
    background:
      radial-gradient(120% 90% at 15% 0%, #FDF6EE 0%, #F0ECE6 55%),
      radial-gradient(80% 70% at 100% 100%, rgba(15,118,110,0.06) 0%, rgba(0,0,0,0) 60%);
  }
  /* App-screen base */
  .screen {
    position: absolute; inset: 0;
    background: var(--bg);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .scroll { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }
  .scroll::-webkit-scrollbar { width: 0; display: none; }

  h1,h2,h3,h4 { font-family: var(--font-h); margin: 0; letter-spacing: -0.02em; }
  .h-title { font-family: var(--font-h); font-weight: 700; letter-spacing: -0.02em; }
  .ui { font-family: var(--font-h); }

  button { font-family: var(--font-h); cursor: pointer; border: none; background: none; }

  /* Pill button */
  .btn {
    font-family: var(--font-h); font-weight: 600; font-size: 18px;
    border-radius: var(--r-pill);
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    transition: transform .15s ease, box-shadow .2s ease, opacity .2s ease, background .2s ease;
    user-select: none; white-space: nowrap;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--primary); color: #fff; box-shadow: var(--shadow-soft); }
  .btn-primary:active { background: var(--primary-700); }
  .btn-block { width: 100%; height: 56px; }

  .tag {
    font-family: var(--font-h); font-weight: 600; font-size: 12.5px;
    border-radius: var(--r-pill); padding: 4px 11px;
    display: inline-flex; align-items: center; gap: 5px; white-space: nowrap;
  }
  .tag-teal { background: var(--primary-50); color: var(--primary); }
  .tag-orange { background: var(--accent-50); color: var(--accent); }
  .tag-grey { background: #F4F1EC; color: var(--muted); }

  .fade-in { opacity: 1; animation: fadeIn .35s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  /* slide transitions handled inline via transform */

  @keyframes shimmer {
    0% { background-position: -200px 0; }
    100% { background-position: 320px 0; }
  }
  .shimmer {
    background: linear-gradient(90deg, #F1ECE6 0%, #F8F4EF 50%, #F1ECE6 100%);
    background-size: 320px 100%;
    animation: shimmer 1.2s infinite linear;
  }

  @keyframes popUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes scaleIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  .dim { position: absolute; inset: 0; background: rgba(28,25,23,0.38); animation: fadeIn .25s ease; z-index: 40; }

  .label {
    font-family: var(--font-h); font-weight: 600; font-size: 13px;
    text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted);
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="data.js"></script>
  <script type="text/babel" src="frames/ios-frame.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="screens/Onboarding.jsx"></script>
  <script type="text/babel" src="screens/Dashboard.jsx"></script>
  <script type="text/babel" src="screens/RightDetail.jsx"></script>
  <script type="text/babel" src="screens/Forum.jsx"></script>
  <script type="text/babel" src="screens/Profile.jsx"></script>
  <script type="text/babel" src="App.jsx"></script>
</body>
</html>
